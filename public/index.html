<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hệ thống quản lý đặt phòng khách sạn - Hotel Booking Management System">
  <title>Hotel Booking Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header id="main-header">
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 21h18M3 7v1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7m0 1a3 3 0 0 0 6 0V7H3l2-4h14l2 4M5 21V10.87M19 21V10.87"/>
        </svg>
        <h1>Hotel Management</h1>
      </div>
      <nav class="header-nav">
        <button id="btn-tab-crud" class="nav-btn active" onclick="switchTab('crud')">Quản Lý Dữ Liệu</button>
        <button id="btn-tab-sql" class="nav-btn" onclick="switchTab('sql')">SQL Console</button>
      </nav>
    </div>
  </header>

  <main>
    <!-- ═══════ CRUD TAB ═══════ -->
    <section id="tab-crud" class="tab-content active">
      <!-- Table Selector -->
      <div class="card selector-card">
        <div class="selector-row">
          <label for="table-select">Chọn bảng</label>
          <select id="table-select"></select>
        </div>
        <div class="action-buttons" id="action-buttons">
          <button class="btn btn-view" id="btn-view" onclick="handleView()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            View
          </button>
          <button class="btn btn-insert" id="btn-insert" onclick="handleInsert()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Insert
          </button>
          <button class="btn btn-update" id="btn-update" onclick="handleUpdate()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Update
          </button>
          <button class="btn btn-delete" id="btn-delete" onclick="handleDelete()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Delete
          </button>
        </div>
      </div>

      <!-- Form Fields -->
      <div class="card form-card" id="form-card">
        <div class="form-header">
          <h2 id="form-title">Thông tin bảng</h2>
          <span class="mode-badge" id="mode-badge">VIEW</span>
        </div>
        <div class="form-grid" id="form-fields"></div>
        <div class="form-actions" id="form-actions">
          <button class="btn btn-primary" id="btn-submit" onclick="handleSubmit()" style="display:none;">Thực hiện</button>
          <button class="btn btn-search" id="btn-search" onclick="handleSearch()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Search
          </button>
          <button class="btn btn-outline" onclick="clearForm()">Xóa form</button>
        </div>
      </div>

      <!-- Results Table -->
      <div class="card results-card" id="results-card">
        <div class="results-header">
          <h2>Kết quả</h2>
          <span class="row-count" id="row-count">0 dòng</span>
        </div>
        <div class="table-wrapper" id="table-wrapper">
          <p class="empty-state">Chọn bảng và nhấn <strong>View</strong> để xem dữ liệu</p>
        </div>
      </div>
    </section>

    <!-- ═══════ SQL TAB ═══════ -->
    <section id="tab-sql" class="tab-content">
      <div class="card sql-card">
        <h2>SQL Console</h2>
        <p class="sql-hint">Nhập và thực thi câu lệnh SQL trực tiếp</p>
        <textarea id="sql-input" placeholder="SELECT * FROM KhachHang;" spellcheck="false"></textarea>
        <div class="sql-actions">
          <button class="btn btn-primary" onclick="executeSQL()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Thực thi
          </button>
          <button class="btn btn-outline" onclick="document.getElementById('sql-input').value=''">Xóa</button>
        </div>
      </div>
      <div class="card results-card" id="sql-results-card">
        <div class="results-header">
          <h2>Kết quả SQL</h2>
          <span class="row-count" id="sql-row-count"></span>
        </div>
        <div class="table-wrapper" id="sql-table-wrapper">
          <p class="empty-state">Nhập câu lệnh SQL và nhấn <strong>Thực thi</strong></p>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast notification -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
